    <rect x="16" y="26" width="3" height="6" fill="#cce5ff" />
    <rect x="20" y="26" width="3" height="6" fill="#cce5ff" />
    <!-- chassis bottom -->
    <path d="M14 35 L28 35 A5 5 0 0 0 38 35 L52 35 L48 44 L40 44 L40 46 L30 46 L30 44 L22 44 L18 39 L14 39 Z" fill="#ffcb2f" />
    <!-- wheels -->
    <circle cx="18" cy="46" r="7" fill="#808080" />
    <circle cx="18" cy="46" r="3" fill="#fff" />
    <circle cx="46" cy="46" r="7" fill="#808080" />
    <circle cx="46" cy="46" r="3" fill="#fff" />
