    <path d="M28 20 C26 10, 38 6, 44 14 C48 10, 56 16, 54 28 L28 28 Z" fill="#b0aba5" />
    <!-- load dots -->
    <circle cx="46" cy="18" r="1" fill="#000" stroke="none" />
    <circle cx="48" cy="22" r="1" fill="#000" stroke="none" />
    <circle cx="51" cy="24" r="1" fill="#000" stroke="none" />
    <!-- exhaust block -->
    <path d="M4 28 L10 28 L10 38 L4 38 Z" fill="#a19d9d" />
    <path d="M2 38 L8 38 L8 44 L2 44 Z" fill="#a19d9d" />
    <rect x="5" y="24" width="2" height="4" fill="#000" stroke="none" />
    <rect x="8" y="24" width="2" height="4" fill="#000" stroke="none" />
    <!-- main bed -->
    <path d="M8 18 L14 18 L14 23 L28 21 L56 21 L62 34 L52 38 L30 38 L24 35 L14 35 L10 28 L8 28 Z" fill="#ffcb2f" />
